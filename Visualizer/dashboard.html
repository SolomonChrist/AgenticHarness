<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agentic Harness Visualizer - Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <div class="nav">
      <div class="brand">AGENTIC HARNESS / VISUALIZER / DASHBOARD</div>
      <div class="nav-meta">
        <span>roles <b id="role-count">0</b></span>
        <span>projects <b id="project-count">0</b></span>
        <span>todo <b id="todo-count">0</b></span>
        <span>updated <b id="generated-at">-</b></span>
      </div>
    </div>
    <main class="main">
      <section class="card pad" style="margin-bottom:16px;">
        <div class="title">Operator Dashboard</div>
        <h1 class="headline">A compact operational view for demos, monitoring, and remote explanation.</h1>
        <div class="mode-links">
          <a href="/world2d.html">2D</a>
          <a href="/world3d.html">3D</a>
          <a href="/worldvr.html">VR</a>
          <a href="/dashboard.html">Dashboard</a>
        </div>
      </section>
      <section class="stats">
        <div class="stat"><div class="n" id="stat-active">0</div><div class="l">Active</div></div>
        <div class="stat"><div class="n" id="stat-stale">0</div><div class="l">Stale</div></div>
        <div class="stat"><div class="n" id="stat-todo">0</div><div class="l">Todo</div></div>
        <div class="stat"><div class="n" id="stat-progress">0</div><div class="l">In Progress</div></div>
        <div class="stat"><div class="n" id="stat-done">0</div><div class="l">Done</div></div>
      </section>
      <section class="card pad" style="margin-bottom:16px;">
        <div class="title">System Health</div>
        <div class="daemon-grid" id="daemon-grid"></div>
      </section>
      <section class="card pad chat-card" style="margin-bottom:16px;">
        <div class="title">Chief Chat</div>
        <div class="chat-log" id="chat-log"></div>
        <form class="chat-form" id="chat-form">
          <input id="chat-input" autocomplete="off" placeholder="Message Chief_of_Staff from the browser..." />
          <button type="submit">Send</button>
        </form>
      </section>
      <section class="card pad" style="margin-bottom:16px;">
        <div class="title">Workzone</div>
        <div class="workzone-grid" id="workzone"></div>
      </section>
      <section class="world-grid" id="roles-grid"></section>
    </main>
    <aside class="side">
      <div class="title">Recent Events</div>
      <div class="events" id="events"></div>
      <div class="title" style="margin-top:18px;">Projects</div>
      <div class="projects" id="projects"></div>
    </aside>
  </div>
  <script src="app.js"></script>
</body>
</html>
