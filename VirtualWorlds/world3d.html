<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>🦂 Agentic Harness — 3D World</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#080a0c;overflow:hidden;font-family:'Courier New',monospace;color:#c8d4e0}
    #c{display:block;width:100vw;height:100vh}

    /* HUD */
    #hud{position:fixed;top:0;left:0;right:0;pointer-events:none;z-index:10}
    #hud-nav{display:flex;align-items:center;justify-content:space-between;padding:.5rem 1rem;background:rgba(8,10,12,.85);backdrop-filter:blur(8px);border-bottom:1px solid rgba(232,164,34,.3);pointer-events:all}
    #hud-logo{font-size:.85rem;color:#e8a422;letter-spacing:.12em;font-weight:bold}
    #hud-stats{display:flex;gap:1rem;font-size:.7rem;color:#7a8a9e}
    #hud-stats span{color:#edf2f7}
    #hud-time{font-size:.68rem;color:#3a4455}

    /* Info panel */
    #info{position:fixed;bottom:1rem;left:1rem;background:rgba(8,10,12,.9);border:1px solid rgba(232,164,34,.3);border-radius:6px;padding:.9rem;max-width:280px;font-size:.72rem;line-height:1.6;z-index:10;display:none}
    #info h4{color:#e8a422;margin-bottom:.4rem;font-size:.8rem;letter-spacing:.08em}
    #info p{color:#7a8a9e;margin-bottom:.2rem}
    #info p strong{color:#c8d4e0}
    #info .close-btn{position:absolute;top:.4rem;right:.6rem;background:none;border:none;color:#7a8a9e;cursor:pointer;font-size:.8rem}
    #info .close-btn:hover{color:#e8a422}

    /* Controls hint */
    #controls{position:fixed;bottom:1rem;right:1rem;font-size:.65rem;color:#3a4455;line-height:1.8;text-align:right;z-index:10}

    /* VR button */
    #vr-btn{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:rgba(155,125,234,.15);border:1px solid rgba(155,125,234,.4);color:#9b7dea;padding:.45rem 1.2rem;border-radius:4px;font-size:.75rem;cursor:pointer;font-family:'Courier New',monospace;letter-spacing:.08em;z-index:10;transition:all .2s}
    #vr-btn:hover{background:rgba(155,125,234,.3)}
    #vr-btn.hidden{display:none}

    /* Mode links */
    #mode-links{position:fixed;top:52px;right:0;display:flex;flex-direction:column;gap:1px;z-index:10}
    .mode-link{background:rgba(8,10,12,.85);border-left:1px solid rgba(30,37,48,.8);border-bottom:1px solid rgba(30,37,48,.8);padding:.35rem .75rem;font-size:.65rem;color:#7a8a9e;text-decoration:none;letter-spacing:.06em;transition:all .15s}
    .mode-link:hover{color:#e8a422;border-left-color:rgba(232,164,34,.4)}
    .mode-link.active{color:#e8a422;border-left-color:#e8a422}

    /* Loading */
    #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#080a0c;z-index:100;flex-direction:column;gap:.75rem}
    #loading p{color:#e8a422;font-size:.85rem;letter-spacing:.1em}
    #loading .sub{color:#3a4455;font-size:.7rem}
  </style>
</head>
<body>

<div id="loading">
  <p>🦂 LOADING WORLD...</p>
  <p class="sub">Connecting to Harness server</p>
</div>

<canvas id="c"></canvas>

<div id="hud">
  <div id="hud-nav">
    <div id="hud-logo">🦂 AGENTIC HARNESS — 3D WORLD</div>
    <div id="hud-stats">
      <span id="hs-p">0</span> projects &nbsp;
      <span id="hs-a">0</span> agents &nbsp;
      <span id="hs-t">0</span> tasks
    </div>
    <div id="hud-time"></div>
  </div>
</div>

<div id="mode-links">
  <a class="mode-link" href="/">2D Map</a>
  <a class="mode-link active" href="#">3D World</a>
  <a class="mode-link" href="/worldvr.html">VR</a>
</div>

<div id="info">
  <button class="close-btn" onclick="closeInfo()">✕</button>
  <h4 id="info-title"></h4>
  <div id="info-body"></div>
</div>

<div id="controls">
  WASD / Arrow keys to move<br>
  Mouse drag to look<br>
  Click object to inspect<br>
  Scroll to zoom
</div>

<button id="vr-btn" class="hidden" onclick="enterVR()">🥽 Enter VR</button>

<script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
  }
}
</script>

<script>
// ── THREE.JS r128 CDN (no modules needed) ──
const script = document.createElement('script');
script.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
script.onload = () => initWorld();
document.head.appendChild(script);

const API = window.location.origin;
let scene, camera, renderer, clock;
let worldObjects = {};  // name → mesh
let agentMeshes = [];
let raycaster, mouse;
let worldData = null;
let keys = {};
let camYaw = 0, camPitch = 0;
let isPointerLocked = false;

function initWorld() {
  const canvas = document.getElementById('c');

  // Scene
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a1628);  // deep navy night sky
  scene.fog = new THREE.Fog(0x0a1220, 80, 280);   // subtle distance haze

  camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 500);
  camera.position.set(0, 22, 38);

  renderer = new THREE.WebGLRenderer({canvas, antialias: true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  clock = new THREE.Clock();
  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2();

  // ── DAYTIME LIGHTING ──
  // Bright sky ambient
  const ambient = new THREE.AmbientLight(0x3a5080, 3.5);  // blue-tinted, bright enough to see
  scene.add(ambient);

  // Sun — warm directional from upper-right
  const sun = new THREE.DirectionalLight(0xaabbdd, 1.2);
  sun.position.set(30, 60, 20);
  sun.castShadow = true;
  sun.shadow.camera.near = 0.1;
  sun.shadow.camera.far = 300;
  sun.shadow.camera.left = -100;
  sun.shadow.camera.right = 100;
  sun.shadow.camera.top = 100;
  sun.shadow.camera.bottom = -100;
  sun.shadow.mapSize.width = 2048;
  sun.shadow.mapSize.height = 2048;
  scene.add(sun);

  // Sky/ground hemisphere — blue sky above, green-grey ground below
  scene.add(new THREE.HemisphereLight(0x334455, 0x1a2830, 1.2));  // neutral fill, not blue-tinted

  // Grid floor
  buildFloor();

  // Street furniture — lights, trees, benches
  buildStreetFurniture();

  // Stars
  buildStars();

  // Controls
  setupControls(canvas);

  // Events
  window.addEventListener('resize', onResize);
  canvas.addEventListener('click', onClick);

  // Check WebXR
  if (navigator.xr) {
    navigator.xr.isSessionSupported('immersive-vr').then(supported => {
      if (supported) document.getElementById('vr-btn').classList.remove('hidden');
    });
  }

  // Fetch world data
  fetchAndBuild();
  setInterval(fetchAndBuild, 8000);
  setInterval(() => {
    document.getElementById('hud-time').textContent = new Date().toLocaleTimeString();
  }, 1000);

  // Start render loop
  renderer.setAnimationLoop(render);
  document.getElementById('loading').style.display = 'none';
}

function buildFloor() {
  // Dark tile floor — night city
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(400, 400),
    new THREE.MeshStandardMaterial({color:0x1a2535, roughness:0.9, metalness:0.05})
  );
  floor.rotation.x = -Math.PI/2;
  floor.receiveShadow = true;
  scene.add(floor);

  // Subtle grid on floor
  const grid = new THREE.GridHelper(400, 80, 0x0d1520, 0x0d1520);
  grid.position.y = 0.01;
  scene.add(grid);

  // Road strips
  const roadMat = new THREE.MeshStandardMaterial({color:0x0a0e15, roughness:0.9});
  [0, 26, 52].forEach(oz => {
    const road = new THREE.Mesh(new THREE.BoxGeometry(320, 0.03, 3), roadMat);
    road.position.set(0, 0.01, oz);
    scene.add(road);
    for (let dx=-30; dx<30; dx+=4) {
      const dash = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.04, 0.15),
        new THREE.MeshStandardMaterial({color:0xe8a422, emissive:0xe8a422, emissiveIntensity:0.3}));
      dash.position.set(dx*4, 0.02, oz);
      scene.add(dash);
    }
  });
}

function buildStreetFurniture() {
  // Street lights
  const lightPositions = [
    [-12,0],[-12,26],[12,0],[12,26],[38,0],[38,26],
    [-38,0],[-38,26],[0,-12],[26,-12],[0,38],[26,38]
  ];
  lightPositions.forEach(([lx,lz]) => {
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.1,4,6),
      new THREE.MeshStandardMaterial({color:0x2a3040}));
    pole.position.set(lx, 2, lz);
    scene.add(pole);
    const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.25,8,8),
      new THREE.MeshStandardMaterial({color:0xe8e8c0, emissive:0xe8e8a0, emissiveIntensity:2}));
    lamp.position.set(lx, 4.2, lz);
    scene.add(lamp);
    const light = new THREE.PointLight(0xe8e8a0, 0.5, 12);
    light.position.set(lx, 4.2, lz);
    scene.add(light);
  });

  // Trees
  const treePos = [[-5,5],[-5,-5],[5,5],[5,-5],[21,5],[21,-5],[31,5],[31,-5]];
  treePos.forEach(([tx,tz]) => {
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.2,1.5,6),
      new THREE.MeshStandardMaterial({color:0x3a2010}));
    trunk.position.set(tx, 0.75, tz);
    scene.add(trunk);
    // Layered canopy
    [2.0,3.0,3.8].forEach((gy,gi) => {
      const r = 1.2-gi*0.2;
      const canopy = new THREE.Mesh(new THREE.SphereGeometry(r,8,6),
        new THREE.MeshStandardMaterial({color:gi===0?0x1a3a15:gi===1?0x2a5a20:0x3a6a28, roughness:0.9}));
      canopy.position.set(tx, gy, tz);
      scene.add(canopy);
    });
  });

  // Benches near plaza
  [[0,8],[26,8],[0,-3],[26,-3]].forEach(([bx,bz]) => {
    const seat = new THREE.Mesh(new THREE.BoxGeometry(2.5,0.15,0.6),
      new THREE.MeshStandardMaterial({color:0x3a2810}));
    seat.position.set(bx, 0.5, bz);
    scene.add(seat);
    // Bench legs
    [-0.9,0.9].forEach(ox => {
      const leg = new THREE.Mesh(new THREE.BoxGeometry(0.1,0.5,0.6),
        new THREE.MeshStandardMaterial({color:0x2a2a3a}));
      leg.position.set(bx+ox, 0.25, bz);
      scene.add(leg);
    });
  });
}

function buildStars() {
  // Star field
  const geo = new THREE.BufferGeometry();
  const count = 3000;
  const pos = new Float32Array(count * 3);
  const sizes = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 200 + Math.random() * 50;
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = Math.abs(r * Math.cos(phi)) + 20; // above horizon only
    pos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
    sizes[i] = 0.2 + Math.random() * 0.5;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const starMat = new THREE.PointsMaterial({color:0xddeeff, size:0.4, sizeAttenuation:true});
  scene.add(new THREE.Points(geo, starMat));

  // Moon
  const moon = new THREE.Mesh(
    new THREE.SphereGeometry(4, 16, 16),
    new THREE.MeshStandardMaterial({color:0xeeeedd, emissive:0xddddcc, emissiveIntensity:0.6})
  );
  moon.position.set(-80, 120, -150);
  scene.add(moon);

  // Moon glow
  const moonGlow = new THREE.PointLight(0xaabbdd, 0.8, 500);
  moonGlow.position.set(-80, 120, -150);
  scene.add(moonGlow);
}

const STATUS_COLORS = {
  ACTIVE: 0x5dba7a, STANDBY: 0x3a4455, OFFLINE: 0xe85a34,
  STALE: 0xe8a422, BLOCKED: 0xe85a34, COMPLETE: 0x5d9eba, UNKNOWN: 0x1e2530
};
const ARCH_COLORS = {
  Builder:0xe8a422, Scout:0x5dba7a, Guardian:0x5d9eba,
  Sage:0x9b7dea, Hustler:0xf0b535, Creator:0xe85a34,
  Fixer:0x5dba7a, Diplomat:0x9b7dea, default:0x7a8a9e
};

// Movement profiles — each archetype moves differently in 3D
const ARCH_MOVE_3D = {
  Builder:  {bobAmp:0.05, bobSpd:2.5, moveSpd:2.5, wanderRate:0.008, pattern:'purposeful'},
  Scout:    {bobAmp:0.12, bobSpd:2.0, moveSpd:2.0, wanderRate:0.02,  pattern:'explorer'},
  Guardian: {bobAmp:0.02, bobSpd:0.8, moveSpd:0.7, wanderRate:0.003, pattern:'patrol'},
  Sage:     {bobAmp:0.08, bobSpd:0.6, moveSpd:0.5, wanderRate:0.002, pattern:'orbit'},
  Hustler:  {bobAmp:0.25, bobSpd:5.0, moveSpd:5.0, wanderRate:0.05,  pattern:'erratic'},
  Creator:  {bobAmp:0.15, bobSpd:1.5, moveSpd:1.0, wanderRate:0.012, pattern:'curves'},
  Fixer:    {bobAmp:0.08, bobSpd:3.0, moveSpd:1.5, wanderRate:0.007, pattern:'backforth'},
  Diplomat: {bobAmp:0.10, bobSpd:1.2, moveSpd:1.0, wanderRate:0.005, pattern:'social'},
  default:  {bobAmp:0.10, bobSpd:1.5, moveSpd:1.2, wanderRate:0.01,  pattern:'wander'},
};

async function fetchAndBuild() {
  try {
    const res = await fetch(`${API}/api/world/export`);
    if (!res.ok) return;
    worldData = await res.json();
    const s = worldData.stats;
    document.getElementById('hs-p').textContent = s.total_projects;
    document.getElementById('hs-a').textContent = s.total_agents;
    document.getElementById('hs-t').textContent = s.tasks_todo;
    buildProjects(worldData.projects);
    buildAgents(worldData.agents);
  } catch(e) { console.warn('Fetch error:', e); }
}

function buildProjects(projects) {
  projects.forEach(p => {
    const {x, z} = p.position;
    const {w, d} = p.dimensions;
    const wallH = 3.2;   // low walls so camera sees inside from above
    const color = parseInt(p.color_hex.replace('#',''), 16);

    if (worldObjects[p.id]) {
      // Just update color
      worldObjects[p.id].building.material.emissive.setHex(color);
      return;
    }

    const group = new THREE.Group();
    group.position.set(x + w/2, 0, z + d/2);
    group.userData = {type:'project', data:p};

    // ── FLOOR (dark office carpet — visible from above) ──
    const floorPalette = [0x2a3520, 0x202838, 0x28203a, 0x203028];
    const seed = p.name.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
    const floorMat = new THREE.MeshStandardMaterial({
      color: floorPalette[seed%4], roughness:0.95, metalness:0.0
    });
    const floor = new THREE.Mesh(new THREE.BoxGeometry(w, 0.15, d), floorMat);
    floor.position.y = 0.08;
    floor.receiveShadow = true;
    group.add(floor);

    // Floor tile lines (subtle, darker)
    const tileMat = new THREE.MeshStandardMaterial({color:0x0d1218, roughness:0.9});
    const tileSpacing = 4;
    for (let ti = -Math.floor(w/2); ti <= Math.floor(w/2); ti += tileSpacing) {
      const tl = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.16, d), tileMat);
      tl.position.set(ti, 0.08, 0);
      group.add(tl);
    }
    for (let ti = -Math.floor(d/2); ti <= Math.floor(d/2); ti += tileSpacing) {
      const tl = new THREE.Mesh(new THREE.BoxGeometry(w, 0.16, 0.06), tileMat);
      tl.position.set(0, 0.08, ti);
      group.add(tl);
    }

    // ── WALLS (dark with color accent) ──
    const wallMat = new THREE.MeshStandardMaterial({
      color:0x1a2235, roughness:0.7, metalness:0.1
    });
    const wallAccentMat = new THREE.MeshStandardMaterial({
      color, emissive:color, emissiveIntensity:0.15, roughness:0.5
    });

    // Back wall
    const backWall = new THREE.Mesh(new THREE.BoxGeometry(w, wallH, 0.4), wallMat);
    backWall.position.set(0, wallH/2 + 0.15, -d/2);
    backWall.castShadow = true; backWall.receiveShadow = true;
    group.add(backWall);

    // Side walls
    [-1,1].forEach(side => {
      const sw = new THREE.Mesh(new THREE.BoxGeometry(0.4, wallH, d), wallMat);
      sw.position.set(side*(w/2), wallH/2+0.15, 0);
      sw.castShadow = true; sw.receiveShadow = true;
      group.add(sw);
    });

    // Front wall — two halves with door gap in middle
    const doorW = Math.min(4, w*0.25);
    const halfW = (w - doorW) / 2;
    [-1,1].forEach(side => {
      const fw = new THREE.Mesh(new THREE.BoxGeometry(halfW, wallH, 0.4), wallMat);
      fw.position.set(side*(w/2 - halfW/2), wallH/2+0.15, d/2);
      fw.castShadow = true; fw.receiveShadow = true;
      group.add(fw);
    });
    // Lintel over door
    const lintel = new THREE.Mesh(new THREE.BoxGeometry(doorW, 0.4, 0.4), wallAccentMat);
    lintel.position.set(0, wallH+0.15, d/2);
    group.add(lintel);

    // ── WINDOWS ──
    const glassMat = new THREE.MeshStandardMaterial({
      color:color, transparent:true, opacity:0.25,
      emissive:color, emissiveIntensity:0.35,
      roughness:0.05, metalness:0.1, side:THREE.DoubleSide
    });
    const winW = 2.5, winH = 1.6, winY = 1.4;
    const nWinsW = Math.max(2, Math.floor((w-6)/4));
    const nWinsD = Math.max(1, Math.floor((d-4)/5));

    // Back windows
    for (let i=0; i<nWinsW; i++) {
      const wx = -w/2 + 3 + i*(w-4)/Math.max(1,nWinsW-1);
      const win = new THREE.Mesh(new THREE.PlaneGeometry(winW, winH), glassMat.clone());
      win.position.set(wx, winY+0.15, -d/2+0.22);
      group.add(win);
      // Window frame
      const frameMat = new THREE.MeshStandardMaterial({color:0x888880});
      [[winW+0.2,0.12,0.1,0,winY+0.15,-d/2+0.23],
       [0.12,winH+0.2,0.1,wx-winW/2,winY+0.15,-d/2+0.23],
       [0.12,winH+0.2,0.1,wx+winW/2,winY+0.15,-d/2+0.23]].forEach(f => {
        const fr = new THREE.Mesh(new THREE.BoxGeometry(f[0],f[1],f[2]), frameMat);
        fr.position.set(wx+(f[3]-wx), f[4], f[5]);
        group.add(fr);
      });
    }

    // Side windows
    [-1,1].forEach(side => {
      for (let i=0; i<nWinsD; i++) {
        const wz = -d/2 + 3 + i*(d-4)/Math.max(1,nWinsD-1);
        const win = new THREE.Mesh(new THREE.PlaneGeometry(2.2, winH), glassMat.clone());
        win.rotation.y = Math.PI/2;
        win.position.set(side*(w/2-0.22), winY+0.15, wz);
        group.add(win);
      }
    });

    // ── INTERIOR FURNITURE ──
    const deskMat = new THREE.MeshStandardMaterial({color:0x2a1e0e, roughness:0.7});
    const chairMat = new THREE.MeshStandardMaterial({color:0x1a2a3a, roughness:0.8});
    const monitorMat = new THREE.MeshStandardMaterial({color:0x080c14, emissive:color, emissiveIntensity:0.4});
    const plantMat = new THREE.MeshStandardMaterial({color:0x1a4a14, roughness:1});
    const plantPotMat = new THREE.MeshStandardMaterial({color:0x4a2a10, roughness:0.9});

    // Desks along the walls
    const deskPositions = [
      [-w/2+2.5, 0, -d/2+2.5, 0],
      [ w/2-2.5, 0, -d/2+2.5, Math.PI],
      [-w/2+2.5, 0,  d/2-2.5, 0],
      [ w/2-2.5, 0,  d/2-2.5, Math.PI],
    ];
    deskPositions.forEach(([dx,dy,dz,ry]) => {
      // Desk surface
      const desk = new THREE.Mesh(new THREE.BoxGeometry(2.8,0.12,1.4), deskMat);
      desk.position.set(dx, 0.86, dz);
      desk.rotation.y = ry;
      desk.castShadow = true;
      group.add(desk);
      // Desk legs
      [[1.1,1.2,0.5],[1.1,1.2,-0.5],[-1.1,1.2,0.5],[-1.1,1.2,-0.5]].forEach(([lx,_,lz]) => {
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.06,0.85,5), deskMat);
        leg.position.set(dx+lx*Math.cos(ry)+lz*Math.sin(ry), 0.43, dz+lx*Math.sin(ry)-lz*Math.cos(ry));
        group.add(leg);
      });
      // Monitor
      const mon = new THREE.Mesh(new THREE.BoxGeometry(1.0,0.65,0.05), monitorMat);
      mon.position.set(dx, 1.25, dz + (ry===0?-0.3:0.3));
      mon.rotation.y = ry;
      group.add(mon);
      // Chair
      const chair = new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.35,0.15,8), chairMat);
      chair.position.set(dx, 0.65, dz + (ry===0?0.9:-0.9));
      group.add(chair);
    });

    // Center meeting area
    if (w > 16) {
      const tableMat = new THREE.MeshStandardMaterial({color:0x1a1208, roughness:0.6});
      const table = new THREE.Mesh(new THREE.CylinderGeometry(2.2,2.2,0.12,12), tableMat);
      table.position.set(0, 0.82, 0);
      group.add(table);
      for (let ci=0; ci<6; ci++) {
        const ang = (ci/6)*Math.PI*2;
        const c = new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.3,0.12,8), chairMat);
        c.position.set(Math.cos(ang)*3.2, 0.62, Math.sin(ang)*3.2);
        group.add(c);
      }
    }

    // Corner plants
    [[-w/2+1.2,-d/2+1.2],[w/2-1.2,-d/2+1.2],[-w/2+1.2,d/2-2.5],[w/2-1.2,d/2-2.5]].forEach(([px,pz]) => {
      const pot = new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.3,0.6,8), plantPotMat);
      pot.position.set(px, 0.45, pz);
      group.add(pot);
      const plant = new THREE.Mesh(new THREE.SphereGeometry(0.7,8,6), plantMat);
      plant.position.set(px, 1.2, pz);
      group.add(plant);
    });

    // Wall accent strip (color of project)
    const accent = new THREE.Mesh(new THREE.BoxGeometry(w+0.5, 0.25, 0.1), wallAccentMat);
    accent.position.set(0, 0.4, -d/2-0.05);
    group.add(accent);

    // ── ROOF EDGE TRIM ──
    const roofMat = new THREE.MeshStandardMaterial({color:0x1e2a3a, roughness:0.7, emissive:color, emissiveIntensity:0.08});
    [
      [w+0.8, 0.3, 0.8, 0, 0, -d/2-0.1],
      [w+0.8, 0.3, 0.8, 0, 0,  d/2+0.1],
      [0.8, 0.3, d+0.8, 0, -w/2-0.1, 0],
      [0.8, 0.3, d+0.8, 0,  w/2+0.1, 0],
    ].forEach(([rw,rh,rd,_,rx,rz]) => {
      const rim = new THREE.Mesh(new THREE.BoxGeometry(rw,rh,rd), roofMat);
      rim.position.set(rx, wallH+0.3, rz);
      rim.castShadow = true;
      group.add(rim);
    });

    // ── PROJECT SIGN on front wall ──
    const signSprite = makeTextSprite(p.name, color, 0.7);
    signSprite.position.set(0, wallH+1.2, d/2+0.5);
    group.add(signSprite);

    // Building light — project color tint, low intensity
    const indoorLight = new THREE.PointLight(color, 0.4, 18);
    indoorLight.position.set(0, 2.5, 0);
    group.add(indoorLight);

    const beacon = new THREE.Mesh(
      new THREE.SphereGeometry(0.2,8,8),
      new THREE.MeshStandardMaterial({color, emissive:color, emissiveIntensity:1.5})
    );
    beacon.position.set(0, wallH+0.8, 0);
    beacon.userData.isBeacon = true;
    group.add(beacon);

    scene.add(group);
    worldObjects[p.id] = {group, building:floor, beacon, data:p, wallH, w, d};
  });
}

function buildAgents(agents) {
  agentMeshes.forEach(m => scene.remove(m.group));
  agentMeshes = [];

  agents.forEach((agent, idx) => {
    const archetype = (agent.archetype||'Builder').split(' ')[0];
    const color = ARCH_COLORS[archetype] || ARCH_COLORS.default;
    const move = ARCH_MOVE_3D[archetype] || ARCH_MOVE_3D.default;
    const isOffline = agent.status==='OFFLINE';

    // Find the project zone this agent belongs to
    const proj = worldData?.projects?.find(p=>p.id===agent.project_id||p.name===agent.project_id||p.name===agent.project);
    let startX, startZ;
    if (proj) {
      const pw = proj.dimensions.w, pd = proj.dimensions.d;
      const pcx = proj.position.x + pw/2;
      const pcz = proj.position.z + pd/2;
      // Spread agents inside the building, away from walls
      const margin = 3;
      const spread = 3.5;
      startX = pcx + (idx%3 - 1)*spread;
      startZ = pcz + (Math.floor(idx/3)%3 - 1)*spread;
    } else {
      startX = idx*4;
      startZ = 0;
    }

    const group = new THREE.Group();
    group.position.set(startX, 0.23, startZ);
    group.scale.setScalar(1.6);  // scale up so agents are clearly visible
    group.userData = {type:'agent', data:agent, archetype, move};

    buildAvatar3D(group, archetype, color, isOffline, agent);

    // Name label
    const disp = (agent.display || agent.id).split('-')[0];
    const label = makeTextSprite(disp, color, 0.38);
    label.position.y = 2.8;
    group.add(label);

    // Activity label
    const actText = agent.current_task || agent.last_action || '';
    if (actText) {
      const actLabel = makeActivitySprite(actText, color, agent.status);
      actLabel.position.y = 3.5;
      actLabel.userData.isActivityLabel = true;
      group.add(actLabel);
    }

    scene.add(group);

    agentMeshes.push({
      group, data:agent, archetype, move, color,
      phase: Math.random()*Math.PI*2,
      orbitAngle: Math.random()*Math.PI*2,
      orbitR: 2+Math.random()*1.5,
      tx: startX, tz: startZ,
      patternT: Math.random()*100,
      _px: startX, _pz: startZ,
      projectId: agent.project_id || agent.project,
    });

    // Self-illumination so agent is always visible
    const selfLight = new THREE.PointLight(color, 0.5, 5);
    selfLight.position.y = 1;
    group.add(selfLight);
  });
}

function buildAvatar3D(group, archetype, color, isOffline, agent) {
  const skin = 0xd4a870;
  const bodyAlpha = isOffline ? 0.55 : 1;

  // All materials use the archetype color as body — guaranteed contrast
  const bodyMat = new THREE.MeshStandardMaterial({
    color, emissive:color, emissiveIntensity:0.55,
    roughness:0.4, metalness:0.2,
    transparent:isOffline, opacity:bodyAlpha
  });
  const skinMat = new THREE.MeshStandardMaterial({
    color:skin, emissive:skin, emissiveIntensity:0.3,
    roughness:0.6, metalness:0,
    transparent:isOffline, opacity:bodyAlpha
  });
  const darkMat = new THREE.MeshStandardMaterial({
    color:0x1a1a2a, roughness:0.8,
    transparent:isOffline, opacity:bodyAlpha
  });
  const accentMat = (c) => new THREE.MeshStandardMaterial({
    color:c, emissive:c, emissiveIntensity:1.0,
    transparent:isOffline, opacity:bodyAlpha
  });
  const mk = (geo, mat, py, ud) => {
    const m = new THREE.Mesh(geo, mat);
    if (py !== undefined) m.position.y = py;
    if (ud) m.userData = ud;
    m.castShadow = true;
    return m;
  };

  // Ground ring — always the agent color, big and bright
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(0.9, 0.08, 8, 24),
    new THREE.MeshStandardMaterial({color, emissive:color, emissiveIntensity:2, transparent:true, opacity:0.7})
  );
  ring.rotation.x = Math.PI/2;
  ring.position.y = 0.05;
  ring.userData.isRing = true;
  group.add(ring);

  const agentUD = {type:'agent', data:agent};

  switch(archetype) {
    case 'Builder': {
      const body = mk(new THREE.BoxGeometry(1.0,1.3,0.7), bodyMat, 0.65, agentUD);
      group.add(body);
      group.add(mk(new THREE.BoxGeometry(0.7,0.65,0.7), skinMat, 1.6, agentUD));
      group.add(mk(new THREE.CylinderGeometry(0.46,0.42,0.28,8), accentMat(0xf0b535), 2.1));
      group.add(mk(new THREE.CylinderGeometry(0.55,0.55,0.06,8), accentMat(0xf0b535), 1.98));
      const wr = mk(new THREE.BoxGeometry(0.1,0.7,0.1), accentMat(0xaaaaaa), 0.7);
      wr.position.x=0.65; wr.userData.isTool=true; group.add(wr);
      break;
    }
    case 'Hustler': {
      group.add(mk(new THREE.BoxGeometry(0.7,1.2,0.55), bodyMat, 0.6, agentUD));
      group.add(mk(new THREE.SphereGeometry(0.35,10,10), skinMat, 1.55, agentUD));
      for(let i=-1;i<=1;i++){
        const sp=mk(new THREE.CylinderGeometry(0.04,0.09,0.4,5),accentMat(0xffcc00),1.98);
        sp.position.x=i*0.13; sp.rotation.z=i*0.3; group.add(sp);
      }
      for(let i=0;i<3;i++){
        const tr=new THREE.Mesh(new THREE.PlaneGeometry(1.0,0.05),
          new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:1,transparent:true,opacity:0.4-i*0.1,side:THREE.DoubleSide}));
        tr.position.set(-0.6-i*0.3,0.5+i*0.2,0); group.add(tr);
      }
      break;
    }
    case 'Guardian': {
      group.add(mk(new THREE.BoxGeometry(1.2,1.4,0.75), bodyMat, 0.7, agentUD));
      [-1,1].forEach(s=>{
        const sh=mk(new THREE.BoxGeometry(0.38,0.28,0.7),accentMat(color),1.2);
        sh.position.x=s*0.75; group.add(sh);
      });
      group.add(mk(new THREE.BoxGeometry(0.65,0.6,0.65), skinMat, 1.75, agentUD));
      group.add(mk(new THREE.BoxGeometry(0.68,0.3,0.68), bodyMat, 2.2));
      group.add(mk(new THREE.BoxGeometry(0.7,0.22,0.35), accentMat(0xaaddff), 1.85));
      const shield=mk(new THREE.BoxGeometry(0.1,1.0,0.7),accentMat(color),0.7);
      shield.position.x=-0.8; group.add(shield);
      break;
    }
    case 'Sage': {
      group.add(mk(new THREE.CylinderGeometry(0.38,0.6,1.5,10), bodyMat, 0.75, agentUD));
      group.add(mk(new THREE.SphereGeometry(0.35,12,12), skinMat, 1.8, agentUD));
      group.add(mk(new THREE.CylinderGeometry(0.38,0.42,0.45,10), bodyMat, 2.22));
      const orb=mk(new THREE.SphereGeometry(0.22,12,12),
        new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:4,transparent:true,opacity:0.9}),2.9);
      orb.userData.isOrb=true; group.add(orb);
      const ol=new THREE.PointLight(color,1.0,6); ol.position.y=2.9; group.add(ol);

    }
    case 'Scout': {
      group.add(mk(new THREE.BoxGeometry(0.72,1.2,0.6), bodyMat, 0.6, agentUD));
      const pack=mk(new THREE.BoxGeometry(0.32,0.6,0.28), darkMat, 0.75);

      group.add(mk(new THREE.CylinderGeometry(0.36,0.34,0.2,8), bodyMat, 1.85));
      const binos=mk(new THREE.BoxGeometry(0.4,0.18,0.22),accentMat(0xffffff),1.56);
      binos.position.set(0.42,0,0.25); binos.userData.isBinos=true; group.add(binos);

    case 'Creator': {
      group.add(mk(new THREE.BoxGeometry(0.75,1.2,0.65), bodyMat, 0.6, agentUD));

      group.add(mk(new THREE.BoxGeometry(0.85,0.14,0.7), accentMat(0x4a5030), 0.38));

      [-1,1].forEach(s=>{
        const g=mk(new THREE.CylinderGeometry(0.14,0.14,0.09,10),

        g.rotation.x=Math.PI/2; g.position.set(s*0.14,0,0.3); group.add(g);
      });
      const wrench=mk(new THREE.BoxGeometry(0.08,0.65,0.08),accentMat(0xcccccc),0.65);
      wrench.position.set(0.55,0,0.22); wrench.userData.isWrench=true; group.add(wrench);
      break;

    case 'Diplomat': {
      group.add(mk(new THREE.BoxGeometry(0.8,1.3,0.65), bodyMat, 0.65, agentUD));
      const tie=mk(new THREE.BoxGeometry(0.12,0.7,0.06),accentMat(color),0.75);
      tie.position.z=0.32; group.add(tie);

      const arm=mk(new THREE.BoxGeometry(0.16,0.6,0.16), bodyMat, 1.0);

    default: {
      group.add(mk(new THREE.CylinderGeometry(0.4,0.5,1.3,8), bodyMat, 0.65, agentUD));
      group.add(mk(new THREE.SphereGeometry(0.36,12,12),
        new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:0.8}), 1.65, agentUD));

  }

function makeTextSprite(text, color, scale=0.7) {
  const cv = document.createElement('canvas');
  cv.width = 256; cv.height = 64;
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, 256, 64);
  const hex = '#' + color.toString(16).padStart(6,'0');
  ctx.fillStyle = hex;
  ctx.font = 'bold 22px Courier New';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text.slice(0,18), 128, 32);
  const tex = new THREE.CanvasTexture(cv);
  const mat = new THREE.SpriteMaterial({map:tex, transparent:true, depthTest:false});
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(scale*4, scale, 1);
  return sprite;
}

function makeActivitySprite(text, color, status) {
  const cv = document.createElement('canvas');
  cv.width = 400; cv.height = 80;
  const ctx = cv.getContext('2d');
  const hex = '#' + color.toString(16).padStart(6,'0');

  // Clean text
  const clean = text.replace(/^[^\w\s]+\s*/, '').slice(0, 40);

  // Background pill
  ctx.fillStyle = 'rgba(8,12,20,0.92)';
  ctx.beginPath();
  ctx.roundRect(4, 8, 392, 64, 12);
  ctx.fill();

  // Left accent bar
  ctx.fillStyle = hex;
  ctx.globalAlpha = status==='OFFLINE' ? 0.3 : 0.9;
  ctx.fillRect(8, 12, 4, 56);
  ctx.globalAlpha = 1;

  // Border
  ctx.strokeStyle = hex + (status==='OFFLINE'?'44':'99');
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(4, 8, 392, 64, 12);
  ctx.stroke();

  // Status dot
  const dotC = status==='WORKING'||status==='ACTIVE' ? '#5dba7a' :
               status==='STALE' ? '#e8a422' :
               status==='BLOCKED' ? '#e85a34' : '#3a4455';
  ctx.fillStyle = dotC;
  ctx.beginPath(); ctx.arc(24, 28, 6, 0, Math.PI*2); ctx.fill();

  // Text
  ctx.fillStyle = status==='OFFLINE' ? '#3a4455' : '#c8d4e0';
  ctx.font = '18px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText(clean, 38, 33);

  // Second line if text is long
  if (text.length > 40) {
    ctx.fillStyle = '#7a8a9e';
    ctx.font = '15px Courier New';
    ctx.fillText(text.slice(40, 72), 38, 56);
  }

  const tex = new THREE.CanvasTexture(cv);
  const mat = new THREE.SpriteMaterial({map:tex, transparent:true, depthTest:false});
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(3.5, 0.7, 1);
  return sprite;
}

function setupControls(canvas) {
  // Keyboard
  window.addEventListener('keydown', e => { keys[e.code] = true; });
  window.addEventListener('keyup', e => { keys[e.code] = false; });

  // Pointer lock for mouse look
  canvas.addEventListener('click', () => {
    if (!isPointerLocked) canvas.requestPointerLock?.();
  });
  document.addEventListener('pointerlockchange', () => {
    isPointerLocked = document.pointerLockElement === canvas;
  });
  document.addEventListener('mousemove', e => {
    if (!isPointerLocked) return;
    camYaw -= e.movementX * 0.002;
    camPitch -= e.movementY * 0.002;
    camPitch = Math.max(-1.2, Math.min(0.5, camPitch));
  });

  // Touch look (mobile)
  let lastTX = 0, lastTY = 0;
  canvas.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      lastTX = e.touches[0].clientX;
      lastTY = e.touches[0].clientY;
    }
  }, {passive:true});
  canvas.addEventListener('touchmove', e => {
    if (e.touches.length !== 1) return;
    const dx = e.touches[0].clientX - lastTX;
    const dy = e.touches[0].clientY - lastTY;
    camYaw -= dx * 0.004;
    camPitch -= dy * 0.004;
    camPitch = Math.max(-1.2, Math.min(0.5, camPitch));
    lastTX = e.touches[0].clientX;
    lastTY = e.touches[0].clientY;
  }, {passive:true});
}

function onClick(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const clickables = [];
  agentMeshes.forEach(a => { a.body.userData && clickables.push(a.body); });
  Object.values(worldObjects).forEach(o => { o.building.userData && clickables.push(o.building); });

  const hits = raycaster.intersectObjects(clickables);
  if (hits.length > 0) {
    const d = hits[0].object.userData;
    if (d.type === 'project') showProjectInfo(d.data);
    else if (d.type === 'agent') showAgentInfo(d.data);
  }
}

// WebXR VR
function enterVR() {
  if (!navigator.xr) return;
  navigator.xr.requestSession('immersive-vr', {
    requiredFeatures: ['local-floor']
  }).then(session => {
    renderer.xr.enabled = true;
    renderer.xr.setSession(session);
    document.getElementById('vr-btn').textContent = '🥽 In VR — look around';
    session.addEventListener('end', () => {
      renderer.xr.enabled = false;
      document.getElementById('vr-btn').textContent = '🥽 Enter VR';
    });
  }).catch(e => {
    alert('VR not available: ' + e.message + '\n\nUse the /worldvr.html page for full VR support.');
  });
}

// Render loop
function render() {
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();

  // Camera movement
  const speed = 8 * dt;
  const dir = new THREE.Vector3();
  if (keys['KeyW'] || keys['ArrowUp'])    dir.z -= 1;
  if (keys['KeyS'] || keys['ArrowDown'])  dir.z += 1;
  if (keys['KeyA'] || keys['ArrowLeft'])  dir.x -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) dir.x += 1;
  if (keys['KeyQ'] || keys['Space'])      camera.position.y += speed;
  if (keys['KeyE'] || keys['ShiftLeft'])  camera.position.y -= speed;

  dir.normalize().multiplyScalar(speed);
  dir.applyEuler(new THREE.Euler(0, camYaw, 0));
  camera.position.add(dir);
  camera.position.y = Math.max(1.5, camera.position.y);

  // Apply look
  camera.rotation.order = 'YXZ';
  camera.rotation.y = camYaw;
  camera.rotation.x = camPitch;

  // ── ANIMATE AGENTS — personality-driven movement, always active ──
  agentMeshes.forEach(a => {
    const m = a.move || ARCH_MOVE_3D.default;
    a.phase += dt * m.bobSpd;
    a.patternT += dt * m.moveSpd;

    // Get zone bounds — agents stay INSIDE their building
    const proj = worldData?.projects?.find(p => p.id===a.projectId || p.name===a.projectId);
    let pcx=0, pcz=0, hw=6, hd=4;
    if (proj) {
      pcx = proj.position.x + proj.dimensions.w/2;
      pcz = proj.position.z + proj.dimensions.d/2;
      hw = proj.dimensions.w/2 - 2.5;  // wall margin
      hd = proj.dimensions.d/2 - 2.5;
    }

    const isIdle = a.data.status==='OFFLINE'||a.data.status==='STANDBY';
    // Idle agents move slower but still use their personality pattern
    const speedMult = isIdle ? 0.35 : 1.0;

    // Pattern-specific movement — clamped to building interior
    switch(a.archetype) {
      case 'Hustler':
        if (Math.random() < (isIdle?0.01:0.05)) {
          a.tx = pcx+(Math.random()-0.5)*hw*1.8;
          a.tz = pcz+(Math.random()-0.5)*hd*1.8;
        }
        a.group.position.x += (a.tx-a.group.position.x)*(isIdle?0.04:0.14);
        a.group.position.z += (a.tz-a.group.position.z)*(isIdle?0.04:0.14);
        const lx=a.tx-a.group.position.x, lz=a.tz-a.group.position.z;
        if (!isIdle) { a.group.rotation.z=-lx*0.06; a.group.rotation.x=lz*0.06; }
        break;

      case 'Builder':
        if (Math.hypot(a.group.position.x-a.tx, a.group.position.z-a.tz)<0.4) {
          // Walk to workstations (desks + center)
          const pts=[[pcx-hw*.7,pcz-hd*.7],[pcx+hw*.7,pcz-hd*.7],
                     [pcx+hw*.7,pcz+hd*.7],[pcx-hw*.7,pcz+hd*.7],[pcx,pcz]];
          const p2=pts[Math.floor(Math.random()*pts.length)];
          a.tx=p2[0]; a.tz=p2[1];
        }
        a.group.position.x += (a.tx-a.group.position.x)*(isIdle?0.012:0.032);
        a.group.position.z += (a.tz-a.group.position.z)*(isIdle?0.012:0.032);
        break;

      case 'Guardian':
        // Perimeter patrol — walks the inside edge of building
        a.orbitAngle += dt*(isIdle?0.2:0.4);
        const gx=pcx+Math.cos(a.orbitAngle)*hw*0.85;
        const gz=pcz+Math.sin(a.orbitAngle)*hd*0.85;
        a.group.position.x += (gx-a.group.position.x)*0.025;
        a.group.position.z += (gz-a.group.position.z)*0.025;
        a.group.rotation.y = -a.orbitAngle+Math.PI/2;
        break;

      case 'Sage':
        // Slow meditative orbit — levitates slightly even when idle
        a.orbitAngle += dt*(isIdle?0.15:0.28);
        a.group.position.x += (pcx+Math.cos(a.orbitAngle)*a.orbitR-a.group.position.x)*0.018;
        a.group.position.z += (pcz+Math.sin(a.orbitAngle)*a.orbitR-a.group.position.z)*0.018;
        a.group.position.y = 0.15 + Math.sin(a.phase*0.4)*(isIdle?0.1:0.28);
        a.group.traverse(c => {
          if (c.userData.isOrb) { c.position.y=2.6+Math.sin(a.phase)*0.25; }
        });
        break;

      case 'Scout':
        if (Math.random()<(isIdle?0.006:0.016)) {
          a.tx=pcx+(Math.random()-0.5)*hw*1.8;
          a.tz=pcz+(Math.random()-0.5)*hd*1.8;
        }
        a.group.position.x += (a.tx-a.group.position.x)*(isIdle?0.015:0.024);
        a.group.position.z += (a.tz-a.group.position.z)*(isIdle?0.015:0.024);
        a.group.traverse(c => { if (c.userData.isBinos) c.rotation.y=Math.sin(a.phase*0.7)*0.5; });
        break;

      case 'Creator':
        const cx2=pcx+Math.sin(a.patternT*0.5)*hw*0.8;
        const cz2=pcz+Math.sin(a.patternT*(isIdle?0.6:0.8))*hd*0.8;
        a.group.position.x += (cx2-a.group.position.x)*(isIdle?0.015:0.028);
        a.group.position.z += (cz2-a.group.position.z)*(isIdle?0.015:0.028);
        a.group.traverse(c => { if (c.userData.isPalette) c.rotation.y+=dt*(isIdle?0.2:0.5); });
        break;

      case 'Fixer':
        // Back and forth scan — even idle fixers scan (looking for bugs)
        const fx=pcx+(Math.sin(a.patternT*(isIdle?0.3:0.6)))*(hw*0.88);
        const fz=pcz+(Math.floor(a.patternT*0.08)%3-1)*hd*0.65;
        a.group.position.x += (fx-a.group.position.x)*(isIdle?0.025:0.045);
        a.group.position.z += (fz-a.group.position.z)*(isIdle?0.015:0.025);
        a.group.traverse(c => { if (c.userData.isWrench) c.rotation.z=Math.sin(a.phase*(isIdle?1:2))*0.45; });
        break;

      case 'Diplomat':
        let nearest3=null, nearD=Infinity;
        agentMeshes.forEach(other => {
          if (other===a) return;
          const d3=a.group.position.distanceTo(other.group.position);
          if (d3>1.2&&d3<nearD) { nearD=d3; nearest3=other; }
        });
        if (nearest3 && nearD < 12) {
          a.tx=nearest3.group.position.x+(Math.random()-0.5);
          a.tz=nearest3.group.position.z+(Math.random()-0.5);
        } else if (Math.random()<0.008) {
          a.tx=pcx+(Math.random()-0.5)*hw*1.5;
          a.tz=pcz+(Math.random()-0.5)*hd*1.5;
        }
        a.group.position.x += (a.tx-a.group.position.x)*(isIdle?0.012:0.02);
        a.group.position.z += (a.tz-a.group.position.z)*(isIdle?0.012:0.02);
        a.group.traverse(c => { if (c.userData.isWaveArm) c.rotation.z=-0.8+Math.sin(a.phase*(isIdle?0.5:1.2))*0.55; });
        break;

      default:
        if (Math.random()<0.007) {
          a.tx=pcx+(Math.random()-0.5)*hw*1.4;
          a.tz=pcz+(Math.random()-0.5)*hd*1.4;
        }
        a.group.position.x += (a.tx-a.group.position.x)*0.02;
        a.group.position.z += (a.tz-a.group.position.z)*0.02;
    }

    // Clamp to building interior
    a.group.position.x = Math.max(pcx-hw, Math.min(pcx+hw, a.group.position.x));
    a.group.position.z = Math.max(pcz-hd, Math.min(pcz+hd, a.group.position.z));

    // Bob up/down (all except Sage who handles it above)
    if (a.archetype!=='Sage') {
      a.group.position.y = 0.23 + Math.sin(a.phase)*m.bobAmp*(isIdle?0.3:1);
    }

    // Face direction of travel
    const mvx=a.group.position.x-a._px, mvz=a.group.position.z-a._pz;
    if (Math.abs(mvx)+Math.abs(mvz)>0.008 && a.archetype!=='Guardian') {
      const targetY = Math.atan2(mvx, mvz);
      a.group.rotation.y += (targetY - a.group.rotation.y)*0.12;
    }
    a._px=a.group.position.x; a._pz=a.group.position.z;

    // Ring pulse
    a.group.traverse(c => {
      if (c.userData.isRing) {
        c.material.opacity = isIdle ? 0.1+Math.abs(Math.sin(a.phase))*0.15 : 0.3+Math.abs(Math.sin(a.phase))*0.45;
      }
      if (c.userData.isActivityLabel) {
        c.position.y = 3.5 + Math.sin(a.phase*0.35)*0.18;
        c.material.opacity = isIdle ? 0.35 : 0.9+Math.sin(a.phase)*0.08;
      }
      if (c.userData.isBeacon) {
        c.material.emissiveIntensity = 2 + Math.sin(t*2)*0.8;
      }
    });
  });

  // Animate beacons
  Object.values(worldObjects).forEach(o => {
    if (o.beacon) o.beacon.material.emissiveIntensity = 2.2 + Math.sin(t*2)*0.6;
  });

  renderer.render(scene, camera);
}
</script>
</body>
</html>
