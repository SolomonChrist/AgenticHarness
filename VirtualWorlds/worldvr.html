<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>🦂 Agentic Harness — VR World</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#080a0c;overflow:hidden;font-family:'Courier New',monospace;color:#c8d4e0}
    #c{display:block;width:100vw;height:100vh}
    #overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;background:#080a0c;z-index:100}
    #overlay h1{color:#e8a422;font-size:1.4rem;letter-spacing:.15em}
    #overlay p{color:#7a8a9e;font-size:.82rem;line-height:1.7;text-align:center;max-width:400px}
    .vr-btn{background:rgba(155,125,234,.15);border:1px solid rgba(155,125,234,.5);color:#9b7dea;padding:.65rem 2rem;border-radius:4px;font-size:.85rem;cursor:pointer;font-family:'Courier New',monospace;letter-spacing:.1em;transition:all .2s;margin-top:.5rem}
    .vr-btn:hover{background:rgba(155,125,234,.3)}
    .browse-btn{background:rgba(232,164,34,.1);border:1px solid rgba(232,164,34,.3);color:#e8a422;padding:.5rem 1.5rem;border-radius:4px;font-size:.78rem;cursor:pointer;font-family:'Courier New',monospace;letter-spacing:.08em;text-decoration:none}
    #hud-vr{position:fixed;top:0;left:0;right:0;padding:.5rem 1rem;background:rgba(8,10,12,.8);border-bottom:1px solid rgba(232,164,34,.2);display:none;align-items:center;justify-content:space-between;font-size:.72rem;color:#7a8a9e;z-index:10}
    #hud-vr.visible{display:flex}
    #hud-vr span{color:#e8a422}
    #mode-bar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;gap:1px;background:rgba(8,10,12,.9);border-top:1px solid rgba(30,37,48,.6);z-index:10;padding:.25rem 0}
    .mbar-link{color:#7a8a9e;text-decoration:none;font-size:.65rem;padding:.3rem .8rem;letter-spacing:.06em;transition:color .15s}
    .mbar-link:hover,.mbar-link.active{color:#9b7dea}
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div id="overlay">
  <h1>🥽 VR WORLD</h1>
  <p>
    Point your VR headset browser to this page.<br>
    Works with Meta Quest, Pico, Apple Vision Pro,<br>
    and any WebXR-compatible device.<br><br>
    On desktop: loads 3D scene you can navigate with mouse.
  </p>
  <button class="vr-btn" id="enter-vr-btn">🥽 Enter VR</button>
  <a class="browse-btn" href="/world3d.html">← 3D World (Desktop)</a>
</div>

<div id="hud-vr">
  <span>🦂 AGENTIC HARNESS</span>
  <span id="vr-stats">Loading...</span>
  <span id="vr-time"></span>
</div>

<div id="mode-bar">
  <a class="mbar-link" href="/">2D</a>
  <a class="mbar-link" href="/world3d.html">3D</a>
  <a class="mbar-link active">VR</a>
</div>

<script>
const THREE_URL = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
const API = window.location.origin;

let scene, camera, renderer, clock;
let agentMeshes = [], projectMeshes = [];
let worldData = null;
let vrSession = null;
let gazeRaycaster, gazeIndicator;
let controllers = [];

function loadThree(cb) {
  const s = document.createElement('script');
  s.src = THREE_URL;
  s.onload = cb;
  document.head.appendChild(s);
}

loadThree(() => {
  setupScene();
  fetchWorld();
  setInterval(fetchWorld, 8000);
  setInterval(() => {
    document.getElementById('vr-time').textContent = new Date().toLocaleTimeString();
  }, 1000);

  // Check VR support
  if (navigator.xr) {
    navigator.xr.isSessionSupported('immersive-vr').then(supported => {
      if (!supported) {
        document.getElementById('enter-vr-btn').textContent = 'VR Not Available — Browse in 3D';
        document.getElementById('enter-vr-btn').onclick = () => { window.location = '/world3d.html'; };
      }
    });
  } else {
    document.getElementById('enter-vr-btn').textContent = '← Open 3D World';
    document.getElementById('enter-vr-btn').onclick = () => { window.location = '/world3d.html'; };
  }

  document.getElementById('enter-vr-btn').addEventListener('click', startVR);
});

function setupScene() {
  const canvas = document.getElementById('c');
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x040608);
  scene.fog = new THREE.FogExp2(0x040608, 0.015);
  clock = new THREE.Clock();

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 500);
  camera.position.set(0, 1.6, 12);

  renderer = new THREE.WebGLRenderer({canvas, antialias: true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  renderer.shadowMap.enabled = true;

  // Lights
  scene.add(new THREE.AmbientLight(0x1a2030, 1));
  const sun = new THREE.DirectionalLight(0xe8a422, 0.8);
  sun.position.set(15, 25, 10);
  sun.castShadow = true;
  scene.add(sun);

  // Floor
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(400, 400),
    new THREE.MeshStandardMaterial({color: 0x080a0c, roughness: 1})
  );
  floor.rotation.x = -Math.PI/2;
  floor.receiveShadow = true;
  scene.add(floor);

  const grid = new THREE.GridHelper(400, 80, 0x1a2030, 0x1a2030);
  grid.position.y = 0.01;
  scene.add(grid);

  // Stars
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(3000 * 3);
  for (let i = 0; i < pos.length; i++) pos[i] = (Math.random() - 0.5) * 500;
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({color: 0x3a4455, size: 0.25})));

  // Gaze indicator (dot in center for VR interaction)
  gazeRaycaster = new THREE.Raycaster();
  const dotGeo = new THREE.SphereGeometry(0.01, 8, 8);
  gazeIndicator = new THREE.Mesh(dotGeo, new THREE.MeshBasicMaterial({color: 0xffffff}));
  scene.add(gazeIndicator);

  // Mouse look for desktop
  let isDown = false, lastX = 0, lastY = 0;
  let yaw = 0, pitch = 0;
  canvas.addEventListener('mousedown', e => { isDown = true; lastX = e.clientX; lastY = e.clientY; });
  canvas.addEventListener('mouseup', () => isDown = false);
  canvas.addEventListener('mousemove', e => {
    if (!isDown || renderer.xr.isPresenting) return;
    yaw -= (e.clientX - lastX) * 0.003;
    pitch -= (e.clientY - lastY) * 0.003;
    pitch = Math.max(-1.2, Math.min(0.6, pitch));
    lastX = e.clientX; lastY = e.clientY;
    camera.rotation.order = 'YXZ';
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  renderer.setAnimationLoop(() => {
    const t = clock.getElapsedTime();
    animateAgents(t);
    updateGaze();
    renderer.render(scene, camera);
  });
}

const ARCH_COLORS = {
  Builder:0xe8a422, Scout:0x5dba7a, Guardian:0x5d9eba,
  Sage:0x9b7dea, Hustler:0xe8a422, Creator:0xe85a34,
  Fixer:0x5dba7a, Diplomat:0x9b7dea
};

async function fetchWorld() {
  try {
    const res = await fetch(`${API}/api/world/export`);
    if (!res.ok) return;
    worldData = await res.json();

    const s = worldData.stats;
    document.getElementById('vr-stats').textContent =
      `${s.total_projects} projects · ${s.total_agents} agents · ${s.tasks_todo} tasks`;

    rebuildWorld();
  } catch(e) {}
}

function rebuildWorld() {
  if (!worldData) return;

  // Clear old
  agentMeshes.forEach(m => scene.remove(m));
  projectMeshes.forEach(m => scene.remove(m));
  agentMeshes = []; projectMeshes = [];

  // Build projects
  worldData.projects.forEach(p => {
    const {x, z} = p.position;
    const {w, d} = p.dimensions;
    const h = 4;
    const color = parseInt(p.color_hex.replace('#',''), 16);

    const group = new THREE.Group();
    group.position.set(x + w/2, 0, z + d/2);
    group.userData = {type:'project', data:p};

    // Building
    const bGeo = new THREE.BoxGeometry(w, h, d);
    const bMat = new THREE.MeshStandardMaterial({
      color: 0x141820, emissive: color, emissiveIntensity: 0.1, roughness: 0.7
    });
    const building = new THREE.Mesh(bGeo, bMat);
    building.position.y = h/2;
    building.castShadow = true;
    building.userData = {type:'project', data:p};
    group.add(building);

    // Top glow
    const topGeo = new THREE.BoxGeometry(w, 0.15, d);
    const topMat = new THREE.MeshStandardMaterial({color:color, emissive:color, emissiveIntensity:1.5});
    const top = new THREE.Mesh(topGeo, topMat);
    top.position.y = h + 0.08;
    group.add(top);

    new THREE.PointLight(color, 1.5, 20).position.set(0, h+2, 0);
    const light = new THREE.PointLight(color, 1.5, 20);
    light.position.y = h + 2;
    group.add(light);

    // Floating text panel (in world space)
    buildWorldPanel(group, p.name, `${p.status} · ${p.milestone}`, color, h + 1.5);

    scene.add(group);
    projectMeshes.push(group);
  });

  // Build agents
  worldData.agents.forEach(agent => {
    const {x, z} = agent.position;
    const archetype = (agent.archetype || 'Builder').split(' ')[0];
    const color = ARCH_COLORS[archetype] || 0x7a8a9e;

    const group = new THREE.Group();
    group.position.set(x, 0, z);
    group.userData = {type:'agent', data:agent};

    // Body (capsule approximation)
    const bodyGeo = new THREE.CylinderGeometry(0.35, 0.4, 1.2, 10);
    const bodyMat = new THREE.MeshStandardMaterial({
      color:0x1a2030, emissive:color, emissiveIntensity:0.3
    });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.6;
    body.userData = {type:'agent', data:agent};
    group.add(body);

    const headGeo = new THREE.SphereGeometry(0.32, 12, 12);
    const headMat = new THREE.MeshStandardMaterial({color:color, emissive:color, emissiveIntensity:0.6});
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 1.55;
    head.userData = {type:'agent', data:agent};
    group.add(head);

    // Glow ring
    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(0.6, 0.05, 8, 20),
      new THREE.MeshStandardMaterial({color:color, emissive:color, emissiveIntensity:1, transparent:true, opacity:0.5})
    );
    ring.rotation.x = Math.PI/2;
    ring.position.y = 0.05;
    group.add(ring);

    group.userData.phase = Math.random() * Math.PI * 2;
    buildWorldPanel(group, agent.display || agent.id, agent.archetype || '', color, 2.2, 0.4);

    scene.add(group);
    agentMeshes.push(group);
  });
}

function buildWorldPanel(parent, title, sub, color, yPos, scale=0.6) {
  const cv = document.createElement('canvas');
  cv.width = 512; cv.height = 128;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = 'rgba(8,10,12,0.85)';
  ctx.roundRect(4, 4, 504, 120, 12);
  ctx.fill();
  const hex = '#' + color.toString(16).padStart(6,'0');
  ctx.strokeStyle = hex + '88';
  ctx.lineWidth = 2;
  ctx.roundRect(4, 4, 504, 120, 12);
  ctx.stroke();
  ctx.fillStyle = hex;
  ctx.font = 'bold 36px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(title.slice(0,20), 256, 55);
  ctx.fillStyle = '#7a8a9e';
  ctx.font = '24px Courier New';
  ctx.fillText(sub.slice(0,28), 256, 95);
  const tex = new THREE.CanvasTexture(cv);
  const mat = new THREE.SpriteMaterial({map:tex, transparent:true, depthTest:false});
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(scale * 6, scale * 1.5, 1);
  sprite.position.y = yPos;
  parent.add(sprite);
}

function animateAgents(t) {
  agentMeshes.forEach(group => {
    const phase = group.userData.phase || 0;
    group.position.y = Math.sin(t * 1.5 + phase) * 0.12;
  });
}

function updateGaze() {
  if (!renderer.xr.isPresenting) return;
  gazeRaycaster.set(camera.position, new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion));
  const allObjects = [];
  agentMeshes.forEach(g => g.children.forEach(c => { if (c.userData?.type) allObjects.push(c); }));
  projectMeshes.forEach(g => g.children.forEach(c => { if (c.userData?.type) allObjects.push(c); }));
  const hits = gazeRaycaster.intersectObjects(allObjects);
  if (hits.length > 0) {
    gazeIndicator.position.copy(hits[0].point);
    gazeIndicator.material.color.set(0xe8a422);
  } else {
    const fwd = new THREE.Vector3(0, 0, -3).applyQuaternion(camera.quaternion).add(camera.position);
    gazeIndicator.position.copy(fwd);
    gazeIndicator.material.color.set(0xffffff);
  }
}

async function startVR() {
  if (!navigator.xr) {
    window.location = '/world3d.html';
    return;
  }
  try {
    const session = await navigator.xr.requestSession('immersive-vr', {
      requiredFeatures: ['local-floor'],
      optionalFeatures: ['bounded-floor', 'hand-tracking'],
    });
    vrSession = session;
    renderer.xr.setSession(session);
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('hud-vr').classList.add('visible');

    session.addEventListener('end', () => {
      document.getElementById('overlay').style.display = 'flex';
      document.getElementById('hud-vr').classList.remove('visible');
    });
  } catch(e) {
    alert('Could not start VR: ' + e.message);
  }
}
</script>
</body>
</html>
